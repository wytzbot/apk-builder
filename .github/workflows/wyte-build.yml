name: Wyte APK Builder
on: 
  workflow_dispatch:
    inputs:
      website_url:
        description: 'Enter website URL to wrap'
        required: true
        default: 'https://wytzbot.github.io/wyedit'
      app_name:
        description: 'App Name'
        required: true
        default: 'WyEdit'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.wyte.wyedit'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Create WebView App
        run: |
          npx degit github:CapacitorCommunity/capacitor-template
          cd capacitor-template
          npm i
          npx cap init "$APP_NAME" "$PACKAGE_NAME" --web-dir=www
          echo '<!DOCTYPE html><script>window.location="$URL"</script>' > www/index.html
        env:
          APP_NAME: ${{ inputs.app_name }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          URL: ${{ inputs.website_url }}
          
      - name: Build Android
        run: |
          cd capacitor-template
          npx cap add android
          npx cap sync
          cd android
          ./gradlew assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-APK
          path: capacitor-template/android/app/build/outputs/apk/release/app-release.apk
