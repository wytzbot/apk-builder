name: Wyte URL to APK Builder

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Website URL to convert'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: string
        type: string

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate APK
        run: |
          yes | bubblewrap init --manifest="${{ inputs.app_url }}/manifest.json" --directory=./app
          bubblewrap build --directory=./app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}.apk
          path: ./app/*.apk
